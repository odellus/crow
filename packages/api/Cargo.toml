[package]
name = "api"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["fullstack"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-openai = { version = "0.30", optional = true }
dotenvy = { version = "0.15", optional = true }

[features]
server = ["dioxus/server", "dep:async-openai", "dep:dotenvy"]
